version: '3.9'

services:
  # ─── PostgreSQL ──────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Backend ─────────────────────────────────────────
  backend:
    build:
      context: ./Backend
    restart: unless-stopped
    environment:
      PORT: 8080
      ENV: ${ENV}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXP_HOURS: ${JWT_EXP_HOURS}
      UPLOAD_DIR: /app/uploads
      APP_URL: https://nexone.nexoratech.co
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nexone-api.rule=Host(`nexone.nexoratech.co`) && PathPrefix(`/api`)"
      - "traefik.http.routers.nexone-api.entrypoints=websecure"
      - "traefik.http.routers.nexone-api.tls.certresolver=myresolver"
      - "traefik.http.services.nexone-api.loadbalancer.server.port=8080"

  # ─── Frontend ────────────────────────────────────────
  frontend:
    build:
      context: ./Frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: https://nexone.nexoratech.co/api/v1

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nexone.rule=Host(`nexone.nexoratech.co`)"
      - "traefik.http.routers.nexone.entrypoints=websecure"
      - "traefik.http.routers.nexone.tls.certresolver=myresolver"
      - "traefik.http.services.nexone.loadbalancer.server.port=80"

volumes:
  postgres_data:
  uploads_data:

networks:
  default:
    external: true
    name: web
