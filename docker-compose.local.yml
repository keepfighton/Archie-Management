services:
  postgres:
    environment:
      POSTGRES_USER: cbqa
      POSTGRES_PASSWORD: cbqa123
      POSTGRES_DB: cbqa_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cbqa -d cbqa_db"]
    ports:
      - "55432:5432"

  backend:
    environment:
      PORT: 8080
      ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: cbqa
      DB_PASSWORD: cbqa123
      DB_NAME: cbqa_db
      JWT_SECRET: cbqa-super-secret-key-change-in-production
      JWT_EXP_HOURS: 24
      UPLOAD_DIR: /app/uploads
      APP_URL: http://localhost:3091
      SMTP_HOST: ""
      SMTP_PORT: 587
      SMTP_USER: ""
      SMTP_PASSWORD: ""
      SMTP_FROM: noreply@cbqa.com
      WHATSAPP_VERIFY_TOKEN: ""
      WHATSAPP_ACCESS_TOKEN: ""
      WHATSAPP_PHONE_NUMBER_ID: ""
      WHATSAPP_APP_SECRET: ""
      WHATSAPP_API_VERSION: v20.0
      WHATSAPP_OWNER_NUMBERS: ""
    ports:
      - "3092:8080"

  frontend:
    build:
      args:
        VITE_API_URL: /api/v1
    ports:
      - "3091:80"
