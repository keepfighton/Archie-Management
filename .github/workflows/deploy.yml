name: Deploy NEXONE

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e

            echo "🚀 Masuk ke folder app"
            cd ${{ secrets.APP_PATH }}

            echo "📥 Pull latest code"
            git pull origin main

            echo "🛑 Stop container lama"
            docker compose down

            echo "🔧 Build & start container"
            docker compose up -d --build

            echo "⏳ Tunggu container ready"
            sleep 15

            echo "🔍 Pastikan container jalan"
            docker ps | grep nexone-app

            echo "🗄️ Run Prisma Migration (safe)"
            docker exec nexone-app sh -c "npx prisma migrate deploy || echo 'No migration'"

            echo "🔁 Restart app"
            docker restart nexone-app

            echo "✅ Deploy selesai"
