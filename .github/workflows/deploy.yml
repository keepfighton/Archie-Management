name: Deploy NEXONE

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: nexone-production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        id: deploy
        continue-on-error: true
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script_stop: true
          command_timeout: 20m
          script: |
            set -e
            cd ~/nexora-node/apps/nexone
            git branch -D deploy-tmp >/dev/null 2>&1 || true
            git fetch origin main:deploy-tmp
            git checkout main
            git reset --hard deploy-tmp
            git branch -D deploy-tmp
            docker compose up -d --build --no-deps backend frontend
            docker ps --format '{{.Names}}' | grep '^nexone-backend$'
            docker ps --format '{{.Names}}' | grep '^nexone-frontend$'

      - name: Deployment Status
        if: always()
        run: |
          if [ "${{ steps.deploy.outcome }}" == "success" ]; then
            echo "✅ Deployment successful!"
            echo "🌐 Check: https://nexone.nexoratech.co"
          else
            echo "⚠️ Automated deployment failed (SSH timeout or connection issue)"
            echo ""
            echo "📋 Manual deployment required:"
            echo "1. SSH to server: ssh user@server"
            echo "2. cd ~/nexora-node/apps/nexone"
            echo "3. git pull origin main"
            echo "4. docker compose up -d --build"
            echo ""
            echo "Or contact server admin to check:"
            echo "- VPS firewall settings (allow GitHub Actions IPs)"
            echo "- SSH service status"
            echo "- VPS_HOST, VPS_USER, VPS_PASSWORD secrets"
            exit 0
          fi
