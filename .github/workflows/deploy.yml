name: Deploy Archie Management to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: archie-production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🧰 Install SSH client helpers
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: 🚀 Deploy to VPS via SSH
        id: deploy
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
        run: |
          set -euo pipefail
          deploy_script=".github/scripts/deploy_remote.sh"

          if [ ! -f "$deploy_script" ]; then
            echo "❌ Deploy script not found: $deploy_script"
            exit 1
          fi

          deploy_once() {
            sshpass -p "$VPS_PASSWORD" ssh \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -o IdentitiesOnly=yes \
              -o PreferredAuthentications=password,keyboard-interactive \
              -o PubkeyAuthentication=no \
              -o ConnectionAttempts=3 \
              -o ConnectTimeout=30 \
              -o ServerAliveInterval=20 \
              -o ServerAliveCountMax=6 \
              "$VPS_USER@$VPS_HOST" 'bash -se' < "$deploy_script"
          }

          for attempt in 1 2 3 4 5; do
            echo "🚀 Deployment attempt $attempt/5"
            if deploy_once; then
              exit 0
            fi
            echo "⚠️ Deploy attempt $attempt failed"
            if [ "$attempt" -lt 5 ]; then
              sleep $((attempt * 20))
            fi
          done

          echo "❌ Deployment failed after 5 attempts"
          exit 1

      - name: 📊 Deployment Status
        if: always()
        run: |
          if [ "${{ steps.deploy.outcome }}" = "success" ]; then
            echo "✅ Deployment successful!"
            echo "🌐 Live at: https://management.archieconsultant.com"
            echo "🕐 Deployed at: $(date)"
          else
            echo "⚠️ Automated deployment failed!"
            echo ""
            echo "📋 Manual deployment steps:"
            echo "1. SSH to VPS: ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
            echo "2. cd /opt/archie-management"
            echo "3. git pull origin main"
            echo "4. docker compose up -d --build"
            echo ""
            echo "🔍 Troubleshooting:"
            echo "- Check VPS is accessible"
            echo "- Verify GitHub Secrets: VPS_HOST, VPS_USER, VPS_PASSWORD"
            echo "- Check VPS firewall allows GitHub Actions IPs"
            echo "- Review VPS logs: docker compose logs"
          fi

      - name: 📝 Deployment Summary
        if: always()
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.deploy.outcome }}" = "success" ]; then
            echo "- **Status**: ✅ Success" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Status**: ❌ Failed" >> $GITHUB_STEP_SUMMARY
          fi
          echo "- **Environment**: Production" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: https://management.archieconsultant.com" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Timestamp**: $(date -u)" >> $GITHUB_STEP_SUMMARY
