name: Deploy NEXONE

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: nexone-production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script_stop: true
          command_timeout: 20m
          script: |
            set -e
            cd ~/nexora-node/apps/nexone
            git branch -D deploy-tmp >/dev/null 2>&1 || true
            git fetch origin main:deploy-tmp
            git checkout main
            git reset --hard deploy-tmp
            git branch -D deploy-tmp
            docker compose up -d --build --no-deps backend frontend
            docker ps --format '{{.Names}}' | grep '^nexone-backend$'
            docker ps --format '{{.Names}}' | grep '^nexone-frontend$'
