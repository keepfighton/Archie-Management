name: Deploy PUSINTEK-NEXONE (sambernyawa)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-pusintek-nexone
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            set -e
            cd ~/nexora-node/apps/pusintek-nexone

            echo "==> Pull latest code"
            git pull origin main

            echo "==> Re-protect docker-compose.yml (VPS-specific routing)"
            git update-index --skip-worktree docker-compose.yml

            echo "==> Build & start containers"
            docker compose up -d --build --no-deps frontend backend

            echo "==> Wait for containers"
            sleep 10

            echo "==> Health check"
            curl -sf https://sambernyawa.nexoratech.co > /dev/null && echo "OK sambernyawa.nexoratech.co" || (echo "FAILED" && exit 1)

            echo "==> Deploy complete"

