name: Deploy NEXONE

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e

            echo "🚀 Masuk ke folder app"
            cd ${{ secrets.APP_PATH }}

            echo "📥 Pull latest code"
            git pull origin main

            echo "🔧 Build & start container"
            docker compose up -d --build --remove-orphans

            echo "⏳ Tunggu container ready"
            sleep 15

            echo "🔍 Cek container backend"
            docker ps | grep nexone-backend || (echo "Backend tidak jalan!" && exit 1)

            echo "🌱 Seed initial data jika database kosong"
            USER_COUNT=$(docker exec nexone-postgres sh -lc 'PGPASSWORD="$POSTGRES_PASSWORD" psql -U "$POSTGRES_USER" -d "$POSTGRES_DB" -tAc "SELECT COUNT(*) FROM users;"')
            if [ "$USER_COUNT" = "0" ]; then
              docker exec nexone-backend ./seed
            fi

            echo "✅ Deploy selesai"
